<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catch The Fruits</title>
<style>
body {
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(270deg, #fbc2eb, #a6c1ee);
  animation: bg 8s ease infinite;
  background-size: 400% 400%;
  text-align: center;
  overflow: hidden;
}
@keyframes bg {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}
h1 { margin: 10px; }
#gameArea {
  position: relative;
  width: 100%;
  height: 80vh;
  overflow: hidden;
  background: rgba(255,255,255,0.2);
  border-radius: 20px;
}
#basket {
  position: absolute;
  bottom: 10px;
  width: 120px;
  height: 70px;
  background: url('https://i.imgur.com/yT1eQDh.png') center/cover no-repeat;
}
.fruit {
  position: absolute;
  width: 50px;
  height: 50px;
  text-align: center;
  font-size: 40px;
}
#info {
  display: flex;
  justify-content: center;
  gap: 20px;
  font-size: 18px;
  font-weight: bold;
  margin: 10px;
}
button {
  background: #4CAF50;
  border: none;
  padding: 10px 25px;
  border-radius: 8px;
  color: white;
  font-size: 16px;
  cursor: pointer;
  margin: 10px;
}
button:hover {background: #45a049;}
#message {
  font-size: 24px;
  margin-top: 10px;
  font-weight: bold;
  color: #fff;
  text-shadow: 1px 1px 2px #000;
}
</style>
</head>
<body>
<h1>🍇 Catch The Fruits</h1>
<div id="info">
  <div>Score: <span id="score">0</span></div>
  <div>Missed: <span id="missed">0</span></div>
  <div>⏱️ Time: <span id="time">60</span>s</div>
</div>
<div id="gameArea">
  <div id="basket"></div>
</div>
<div id="message"></div>
<button onclick="restart()">Restart</button>
<button onclick="goBack()">Back to Menu</button>

<script>
const gameArea = document.getElementById("gameArea");
const basket = document.getElementById("basket");
let score = 0;
let missed = 0;
let time = 60;
basket.style.left = "45%";

const fruits = ["🍎","🍌","🍉","🍒","🍇","🍓","🍍"];

document.addEventListener("mousemove", e => {
  basket.style.left = Math.min(Math.max(e.clientX - 60, 0), window.innerWidth - 120) + "px";
});

function dropFruit() {
  const fruit = document.createElement("div");
  fruit.classList.add("fruit");
  fruit.textContent = fruits[Math.floor(Math.random() * fruits.length)];
  fruit.style.left = Math.random() * (window.innerWidth - 50) + "px";
  fruit.style.top = "0px";
  gameArea.appendChild(fruit);

  const fall = setInterval(() => {
    fruit.style.top = fruit.offsetTop + 5 + "px";
    if (fruit.offsetTop >= window.innerHeight - 120) {
      const basketRect = basket.getBoundingClientRect();
      const fruitRect = fruit.getBoundingClientRect();
      if (
        fruitRect.left < basketRect.right &&
        fruitRect.right > basketRect.left &&
        fruitRect.bottom >= basketRect.top
      ) {
        score++;
        document.getElementById("score").textContent = score;
      } else {
        missed++;
        document.getElementById("missed").textContent = missed;
      }
      fruit.remove();
      clearInterval(fall);
    }
  }, 20);
}

function startGame() {
  const fruitInterval = setInterval(dropFruit, 800);
  const timer = setInterval(() => {
    time--;
    document.getElementById("time").textContent = time;
    if (time <= 0) {
      clearInterval(fruitInterval);
      clearInterval(timer);
      endGame();
    }
  }, 1000);
}

function endGame() {
  document.getElementById("message").textContent =
    score > missed ? "🎉 You Win!" : "😢 Try Again!";
}

function restart() { location.reload(); }
function goBack() { window.location.href = "index.html"; }

startGame();
</script>
</body>
</html>
